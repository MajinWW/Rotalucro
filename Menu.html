<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Rota</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column; /* Organiza os botões em coluna */
            justify-content: center;
            align-items: center;
            gap: 20px; /* Espaço entre os dois botões */
            background-color: #101010;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .botao-central {
            display: inline-block;
            background-color: #00E676; /* Verde da sua imagem */
            color: #101010; 
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 50px;
            width: 250px; /* Largura fixa para ficarem iguais */
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 230, 118, 0.3);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .botao-central:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <a href="RotaLucro.html" class="botao-central">RotaLucro</a>

    <a href="RotaCofre.html" class="botao-central">RotaCofre</a>

</body>
</html>
