<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RotaLucro | Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --card-grad: linear-gradient(145deg, #18181b 0%, #050505 100%);
            --primary: #00e676;
            --primary-glow: rgba(0, 230, 118, 0.15);
            --success: #00ff88;
            --danger: #ff3b3b;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --border: #18181b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            background-color: var(--bg); color: var(--text-main); 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            padding-bottom: 110px;
        }

        /* TOAST */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(10px);
            border: 1px solid var(--primary); padding: 16px 24px; border-radius: 20px;
            display: flex; align-items: center; gap: 12px; z-index: 9999; 
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 85%; max-width: 350px;
        }
        #toast.show { top: 30px; }

        header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-size: 1.2rem; font-weight: 800; letter-spacing: -1px; }
        .logo-text span { color: var(--primary); }

        .summary-card {
            margin: 15px 20px 25px; padding: 25px;
            background: var(--card-grad); border-radius: 30px;
            border: 1px solid var(--border); position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden;
        }
        .card-value { font-size: 2.8rem; font-weight: 800; margin: 8px 0; letter-spacing: -1.5px; }
        
        /* GRÁFICO CONTAINER */
        .chart-container {
            background: var(--surface); margin: 0 20px 20px; padding: 20px;
            border-radius: 24px; border: 1px solid var(--border);
            height: 250px;
        }

        .section-title { padding: 0 25px; margin-bottom: 12px; font-size: 0.7rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .form-block { background: var(--surface); margin: 0 20px 15px; border-radius: 20px; border: 1px solid var(--border); }
        .input-row { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .input-row:last-child { border-bottom: none; }
        .input-data { flex: 1; }
        .input-data label { font-size: 0.6rem; color: var(--text-dim); font-weight: 600; display: block; }
        .input-data input { background: none; border: none; color: white; font-size: 1rem; font-weight: 700; width: 100%; }

        .btn-save {
            margin: 15px 20px; width: calc(100% - 40px); background: var(--primary);
            color: #000; padding: 22px; border-radius: 22px; border: none;
            font-size: 1rem; font-weight: 800; cursor: pointer;
        }

        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px;
            z-index: 100;
        }
        .tab-item { border: none; background: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1; }
        .tab-item.active { color: var(--primary); }
        .tab-item i { font-size: 1.2rem; }
        .tab-item span { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; }

        .hist-card { 
            background: var(--surface); margin: 0 20px 10px; padding: 20px; 
            border-radius: 24px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .hidden { display: none !important; }
        .animate { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg"></span></div>

    <header>
        <div class="logo-area"><div class="logo-text">ROTA<span>LUCRO</span></div></div>
        <div onclick="reset()" style="color: var(--danger); font-size: 0.7rem; font-weight: 800;">LIMPAR TUDO</div>
    </header>

    <div id="view-home" class="animate">
        <div class="summary-card">
            <span style="font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase;">Saldo Hoje</span>
            <div class="card-value" id="val-lucro">R$ 0,00</div>
            <div id="val-stats" style="font-size: 0.75rem; color: var(--text-dim);">Aguardando dados...</div>
        </div>

        <div class="section-title">Financeiro</div>
        <div class="form-block">
            <div class="input-row"><i class="fas fa-wallet" style="margin-right:15px; color:var(--primary)"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>Ganhos</label><input type="number" id="in-ganho" oninput="calc()" placeholder="0.00"></div>
                    <div class="input-data"><label>Gastos</label><input type="number" id="in-gasto" oninput="calc()" placeholder="0.00"></div>
                </div>
            </div>
        </div>

        <div class="section-title">Logística</div>
        <div class="form-block">
            <div class="input-row"><i class="fas fa-road" style="margin-right:15px; color:var(--primary)"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>KM Inicial</label><input type="number" id="in-km-i" oninput="calc()"></div>
                    <div class="input-data"><label>KM Final</label><input type="number" id="in-km-f" oninput="calc()"></div>
                </div>
            </div>
            <div class="input-row"><i class="fas fa-clock" style="margin-right:15px; color:var(--primary)"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>Início</label><input type="time" id="in-h-i" onchange="calc()"></div>
                    <div class="input-data"><label>Fim</label><input type="time" id="in-h-f" onchange="calc()"></div>
                </div>
            </div>
        </div>
        <button class="btn-save" onclick="save()">SALVAR DIA</button>
    </div>

    <div id="view-chart" class="hidden animate">
        <div class="section-title">Desempenho Mensal (Lucro)</div>
        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
        <div id="stats-mensal" style="padding: 20px; font-size: 0.9rem; line-height: 1.6;"></div>
    </div>

    <div id="view-history" class="hidden animate">
        <div class="section-title">Últimos Lançamentos</div>
        <div id="history-content"></div>
    </div>

    <nav class="tab-bar">
        <button class="tab-item active" id="tab-home" onclick="nav('home')"><i class="fas fa-plus-circle"></i><span>Lançar</span></button>
        <button class="tab-item" id="tab-chart" onclick="nav('chart')"><i class="fas fa-chart-line"></i><span>Gráfico</span></button>
        <button class="tab-item" id="tab-history" onclick="nav('history')"><i class="fas fa-history"></i><span>Histórico</span></button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('rotalucro_v15')) || [];
        let myChart = null;

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function nav(page) {
            document.querySelectorAll('.animate').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + page).classList.remove('hidden');
            document.getElementById('tab-' + page).classList.add('active');
            if(page === 'history') renderHistory();
            if(page === 'chart') renderChart();
        }

        function calc() {
            const ganho = parseFloat(document.getElementById('in-ganho').value) || 0;
            const gasto = parseFloat(document.getElementById('in-gasto').value) || 0;
            const k1 = parseInt(document.getElementById('in-km-i').value) || 0;
            const k2 = parseInt(document.getElementById('in-km-f').value) || 0;
            const h1 = document.getElementById('in-h-i').value;
            const h2 = document.getElementById('in-h-f').value;
            const lucro = ganho - gasto;
            const km = (k2 > k1) ? k2 - k1 : 0;
            document.getElementById('val-lucro').innerText = `R$ ${lucro.toFixed(2)}`;
            document.getElementById('val-stats').innerText = `${km}km rodados hoje`;
            return { ganho, gasto, km, lucro, date: new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) };
        }

        function save() {
            const d = calc();
            if(d.ganho <= 0) return showToast("Insira os ganhos!");
            db.unshift({ ...d, id: Date.now() });
            localStorage.setItem('rotalucro_v15', JSON.stringify(db));
            showToast("Salvo com sucesso!");
            document.querySelectorAll('input').forEach(i => i.value = "");
            calc();
            nav('history');
        }

        function renderHistory() {
            const cont = document.getElementById('history-content');
            cont.innerHTML = db.length ? "" : "<p style='text-align:center; color:#444'>Vazio</p>";
            db.forEach(i => {
                cont.innerHTML += `<div class="hist-card">
                    <div><b>${i.date}</b><br><small style="color:var(--text-dim)">${i.km}km rodados</small></div>
                    <div style="text-align:right"><b style="color:var(--success)">R$ ${i.lucro.toFixed(2)}</b><br><small>Ganhos R$ ${i.ganho}</small></div>
                </div>`;
            });
        }

        function renderChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const ultimosDias = [...db].reverse().slice(-7); // Pega os últimos 7 dias lançados
            const labels = ultimosDias.map(i => i.date);
            const dadosLucro = ultimosDias.map(i => i.lucro);

            if(myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Lucro Diário',
                        data: dadosLucro,
                        borderColor: '#00e676',
                        backgroundColor: 'rgba(0, 230, 118, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#00e676'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#18181b' }, ticks: { color: '#71717a' } },
                        x: { grid: { display: false }, ticks: { color: '#71717a' } }
                    }
                }
            });

            // Stats mensais
            const totalLucro = db.reduce((acc, curr) => acc + curr.lucro, 0);
            const totalGanho = db.reduce((acc, curr) => acc + curr.ganho, 0);
            document.getElementById('stats-mensal').innerHTML = `
                <div style="background:var(--card-grad); padding:20px; border-radius:20px; border:1px solid var(--border)">
                    <span style="color:var(--text-dim); font-size:0.7rem; text-transform:uppercase">Acumulado Total</span>
                    <div style="font-size:1.8rem; font-weight:800; color:var(--success); margin:5px 0">R$ ${totalLucro.toFixed(2)}</div>
                    <div style="color:var(--text-dim)">Faturamento bruto: R$ ${totalGanho.toFixed(2)}</div>
                </div>
            `;
        }

        function reset() { if(confirm("Apagar tudo?")) { localStorage.removeItem('rotalucro_v15'); db = []; location.reload(); } }
        calc();
    </script>
</body>
</html>
