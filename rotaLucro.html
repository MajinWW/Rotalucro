<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Manifesto Embutido -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"RotaLucro","short_name":"RotaLucro","display":"standalone","background_color":"#000000","theme_color":"#000000"}'>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>RotaLucro | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --card-grad: linear-gradient(145deg, #18181b 0%, #050505 100%);
            --primary: #00e676;
            --success: #00ff88;
            --danger: #ff3b3b;
            --info: #3b82f6;
            --warning: #f59e0b;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --border: #27272a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            background-color: var(--bg); color: var(--text-main); 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            padding-bottom: 110px; overflow-x: hidden;
        }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(10px);
            border: 1px solid var(--primary); padding: 16px 24px; border-radius: 20px;
            display: flex; align-items: center; gap: 12px; z-index: 9999; 
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 85%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-weight: 600;
        }
        #toast.show { top: 30px; }

        header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
        .logo-text span { color: var(--primary); }

        .summary-card {
            margin: 15px 20px 25px; padding: 25px;
            background: var(--card-grad); border-radius: 30px;
            border: 1px solid var(--border); position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden;
        }
        .card-value { font-size: 2.8rem; font-weight: 800; margin: 8px 0; letter-spacing: -1.5px; }
        
        .goal-container { margin-top: 15px; }
        .goal-header { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .goal-header span.edit-goal { color: var(--primary); cursor: pointer; }
        .progress-bg { width: 100%; height: 8px; background: #27272a; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; border-radius: 10px; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .metric-box { display: flex; flex-direction: column; }
        .metric-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700;}
        .metric-val { font-size: 1rem; font-weight: 700; color: var(--text-main); }

        .chart-container { background: var(--surface); margin: 0 20px 20px; padding: 20px; border-radius: 24px; border: 1px solid var(--border); height: 250px; display: flex; justify-content: center; align-items: center;}
        
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 25px; margin-bottom: 12px; }
        .section-title { font-size: 0.75rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin:0;}
        
        .month-select { background: var(--surface); color: var(--primary); border: 1px solid var(--primary-glow); padding: 5px 10px; border-radius: 10px; font-weight: 700; font-family: inherit; font-size: 0.75rem; outline: none; cursor: pointer;}
        
        .form-block { background: var(--surface); margin: 0 20px 15px; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        .input-row { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .input-row:last-child { border-bottom: none; }
        .input-data { flex: 1; min-width: 45%; }
        .input-data label { font-size: 0.65rem; color: var(--text-dim); font-weight: 600; display: block; margin-bottom: 4px; }
        .input-data input, .input-data select { background: none; border: none; color: white; font-size: 1.1rem; font-weight: 700; width: 100%; font-family: inherit; }
        .input-data select { appearance: none; color: var(--primary); font-size: 0.9rem; }
        .input-data input::placeholder { color: #3f3f46; }

        .chip-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; width: 100%; }
        .chip-label { background: #18181b; padding: 8px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; color: var(--text-dim); cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .chip-input:checked + .chip-label { background: var(--primary-glow); color: var(--primary); border: 1px solid var(--primary); }
        .chip-input { display: none; }

        .btn-save { margin: 15px 20px; width: calc(100% - 40px); background: var(--primary); color: #000; padding: 20px; border-radius: 22px; border: none; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: transform 0.1s; }
        .btn-save:active { transform: scale(0.97); }

        .btn-export { background: #18181b; color: white; border: 1px solid var(--border); width: calc(100% - 40px); margin: 10px 20px; padding: 15px; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-half { flex: 1; margin: 0; }
        .action-grid { display: flex; gap: 10px; margin: 0 20px 20px; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; z-index: 100; }
        .tab-item { border: none; background: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex: 1; transition: color 0.3s; }
        .tab-item.active { color: var(--primary); }
        .tab-item i { font-size: 1.4rem; }
        .tab-item span { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }

        .hist-card { background: var(--surface); margin: 0 20px 10px; padding: 18px 20px; border-radius: 20px; border: 1px solid var(--border); display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; }
        .tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 8px; background: #18181b; font-weight: 700; margin-right: 5px; }
        .actions-btn { display: flex; gap: 8px; width: 100%; justify-content: flex-end; margin-top: 5px; border-top: 1px solid #18181b; padding-top: 10px;}
        .btn-icon { background: #18181b; color: var(--text-main); border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.9rem;}
        .btn-icon.del { color: var(--danger); background: rgba(255, 59, 59, 0.1); }
        .btn-icon.edit { color: var(--info); background: rgba(59, 130, 246, 0.1); }

        .hidden { display: none !important; }
        .animate { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg"></span></div>

    <header>
        <div class="logo-area"><div class="logo-text">ROTA<span>LUCRO</span></div></div>
        <div onclick="resetAll()" style="color: var(--text-dim); font-size: 0.75rem; font-weight: 800; cursor: pointer; padding: 5px;"><i class="fas fa-trash"></i> ZERAR</div>
    </header>

    <!-- TELA HOME (LANÇAMENTOS) -->
    <div id="view-home" class="animate">
        <div class="summary-card">
            <span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700;">Prévia do Dia</span>
            <div class="card-value" id="val-lucro">R$ 0,00</div>
            
            <div class="goal-container">
                <div class="goal-header">
                    <span>Meta Diária</span>
                    <span class="edit-goal" onclick="setGoal()"><i class="fas fa-pen"></i> Editar</span>
                </div>
                <div class="progress-bg"><div class="progress-fill" id="goal-bar"></div></div>
                <div style="font-size: 0.65rem; color: var(--text-dim); margin-top: 5px; text-align: right;" id="goal-text">0% de R$ 0,00</div>
            </div>

            <div class="metrics-grid">
                <div class="metric-box">
                    <span class="metric-label">Lucro / Hora</span>
                    <span class="metric-val" id="val-hora">R$ 0,00/h</span>
                </div>
                <div class="metric-box">
                    <span class="metric-label">Lucro / KM</span>
                    <span class="metric-val" id="val-km">R$ 0,00/km</span>
                </div>
            </div>
        </div>

        <div class="section-header">
            <h3 class="section-title">Financeiro & App</h3>
        </div>
        <div class="form-block">
            <div class="input-row">
                <i class="fas fa-mobile-alt" style="margin-right:15px; color:var(--primary); font-size: 1.2rem;"></i>
                <div class="chip-group">
                    <input type="radio" name="appTag" id="app-uber" value="Uber" class="chip-input" checked>
                    <label for="app-uber" class="chip-label">Uber</label>
                    <input type="radio" name="appTag" id="app-99" value="99" class="chip-input">
                    <label for="app-99" class="chip-label">99</label>
                    <input type="radio" name="appTag" id="app-ifood" value="iFood" class="chip-input">
                    <label for="app-ifood" class="chip-label">iFood</label>
                    <input type="radio" name="appTag" id="app-outro" value="Outro" class="chip-input">
                    <label for="app-outro" class="chip-label">Outro</label>
                </div>
            </div>
            <div class="input-row"><i class="fas fa-wallet" style="margin-right:15px; color:var(--primary); font-size: 1.2rem;"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>Ganhos (R$)</label><input type="number" id="in-ganho" oninput="calc()" placeholder="0.00" inputmode="decimal" step="0.01"></div>
                    <div class="input-data"><label>Gastos (R$)</label><input type="number" id="in-gasto" oninput="calc()" placeholder="0.00" inputmode="decimal" step="0.01"></div>
                </div>
            </div>
            <div class="input-row" style="padding-top: 5px;">
                <div class="input-data" style="margin-left: 35px;">
                    <label>Categoria do Gasto</label>
                    <select id="in-cat">
                        <option value="Combustível">Combustível</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Manutenção">Manutenção/Limpeza</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section-header">
            <h3 class="section-title">Logística (Opcional)</h3>
        </div>
        <div class="form-block">
            <div class="input-row"><i class="fas fa-road" style="margin-right:15px; color:var(--primary); font-size: 1.2rem;"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>KM Inicial</label><input type="number" id="in-km-i" oninput="calc()" inputmode="numeric" placeholder="0"></div>
                    <div class="input-data"><label>KM Final</label><input type="number" id="in-km-f" oninput="calc()" inputmode="numeric" placeholder="0"></div>
                </div>
            </div>
            <div class="input-row"><i class="fas fa-clock" style="margin-right:15px; color:var(--primary); font-size: 1.2rem;"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>Hora Início</label><input type="time" id="in-h-i" onchange="calc()"></div>
                    <div class="input-data"><label>Hora Fim</label><input type="time" id="in-h-f" onchange="calc()"></div>
                </div>
            </div>
        </div>
        <button class="btn-save" id="btn-save" onclick="save()">SALVAR DIA</button>
    </div>

    <!-- TELA GRÁFICO / PAINEL -->
    <div id="view-chart" class="hidden animate">
        <div class="section-header">
            <h3 class="section-title">Painel de Evolução</h3>
            <select id="month-filter" class="month-select" onchange="renderChart()">
                <option value="all">Todo Período</option>
            </select>
        </div>
        <div class="chart-container"><canvas id="lineChart"></canvas></div>
        
        <div class="section-header">
            <h3 class="section-title">Para onde foi o gasto?</h3>
        </div>
        <div class="chart-container" style="height: 220px;"><canvas id="pieChart"></canvas></div>

        <div class="section-header">
            <h3 class="section-title">Resumo Financeiro</h3>
        </div>
        <div id="stats-mensal" style="padding: 0 20px; font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px;"></div>
        
        <div class="section-header">
            <h3 class="section-title">Dados e Segurança</h3>
        </div>
        <button class="btn-export" onclick="exportCSV()"><i class="fas fa-file-excel"></i> Exportar Excel (CSV)</button>
        
        <div class="action-grid">
            <button class="btn-export btn-half" onclick="exportBackup()"><i class="fas fa-download"></i> Backup</button>
            <button class="btn-export btn-half" onclick="document.getElementById('importFile').click()"><i class="fas fa-upload"></i> Restaurar</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
        </div>
    </div>

    <!-- TELA HISTÓRICO -->
    <div id="view-history" class="hidden animate">
        <div class="section-header">
            <h3 class="section-title">Histórico de Lançamentos</h3>
        </div>
        <div id="history-content"></div>
    </div>

    <!-- NAVEGAÇÃO BOTTOM -->
    <nav class="tab-bar">
        <button class="tab-item active" id="tab-home" onclick="nav('home')"><i class="fas fa-plus-circle"></i><span>Lançar</span></button>
        <button class="tab-item" id="tab-chart" onclick="nav('chart')"><i class="fas fa-chart-line"></i><span>Painel</span></button>
        <button class="tab-item" id="tab-history" onclick="nav('history')"><i class="fas fa-history"></i><span>Histórico</span></button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('rotalucro_v19')) || [];
        let dailyGoal = parseFloat(localStorage.getItem('rotalucro_goal')) || 200;
        let editingId = null;
        let lineChart = null;
        let pieChart = null;

        const formatMoney = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        const vib = () => { if(navigator.vibrate) navigator.vibrate(40); };

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
            vib();
        }

        function setGoal() {
            vib();
            let newGoal = prompt("Defina sua meta diária de lucro (R$):", dailyGoal);
            if (newGoal && !isNaN(newGoal.replace(',','.'))) {
                dailyGoal = parseFloat(newGoal.replace(',','.'));
                localStorage.setItem('rotalucro_goal', dailyGoal);
                calc();
                showToast("Meta atualizada!");
            }
        }

        function nav(page) {
            vib();
            document.querySelectorAll('.animate').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + page).classList.remove('hidden');
            document.getElementById('tab-' + page).classList.add('active');
            
            if(page === 'chart') {
                updateMonthDropdown();
                renderChart();
            }
            if(page === 'history') renderHistory();
            window.scrollTo(0,0);
        }

        function calcTempo(h1, h2) {
            if(!h1 || !h2) return 0;
            const [h1H, h1M] = h1.split(':').map(Number);
            const [h2H, h2M] = h2.split(':').map(Number);
            let m1 = h1H * 60 + h1M;
            let m2 = h2H * 60 + h2M;
            if (m2 < m1) m2 += 24 * 60; 
            return (m2 - m1) / 60;
        }

  function calc() {
            const ganho = parseFloat(document.getElementById('in-ganho').value.replace(',','.')) || 0;
            const gasto = parseFloat(document.getElementById('in-gasto').value.replace(',','.')) || 0;
            const k1 = parseFloat(document.getElementById('in-km-i').value) || 0;
            const k2 = parseFloat(document.getElementById('in-km-f').value) || 0;
            const h1 = document.getElementById('in-h-i').value;
            const h2 = document.getElementById('in-h-f').value;
            
            const lucro = ganho - gasto;
            const km = (k2 > k1) ? k2 - k1 : 0;
            const horas = calcTempo(h1, h2);
            
            document.getElementById('val-lucro').innerText = formatMoney(lucro);
            document.getElementById('val-hora').innerText = `${formatMoney(horas > 0 ? lucro/horas : 0)}/h`;
            document.getElementById('val-km').innerText = `${formatMoney(km > 0 ? lucro/km : 0)}/km`;

            let percent = dailyGoal > 0 ? (lucro / dailyGoal) * 100 : 0;
            if(percent < 0) percent = 0;
            document.getElementById('goal-bar').style.width = `${Math.min(percent, 100)}%`;
            document.getElementById('goal-bar').style.background = percent >= 100 ? 'var(--success)' : 'var(--primary)';
            document.getElementById('goal-text').innerText = `${percent.toFixed(0)}% de ${formatMoney(dailyGoal)}`;

            return { ganho, gasto, km, lucro, horas, h1, h2, k1, k2, 
                     app: document.querySelector('input[name="appTag"]:checked').value,
                     cat: document.getElementById('in-cat').value,
                     date: new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'}),
                     timestamp: Date.now() };
        }

        function save() {
            const d = calc();
            if(d.ganho <= 0 && d.gasto <= 0) return showToast("Insira valores primeiro!");

            if(editingId) {
                const index = db.findIndex(i => i.id === editingId);
                if(index > -1) { d.id = editingId; d.date = db[index].date; db[index] = d; }
                editingId = null;
                document.getElementById('btn-save').innerText = "SALVAR DIA";
                showToast("Editado com sucesso!");
            } else {
                db.unshift({ ...d, id: Date.now() });
                showToast("Dia salvo!");
            }
            
            localStorage.setItem('rotalucro_v19', JSON.stringify(db));
            
            document.getElementById('in-ganho').value = "";
            document.getElementById('in-gasto').value = "";
            document.getElementById('in-km-i').value = d.k2 > 0 ? d.k2 : ""; 
            document.getElementById('in-km-f').value = "";
            document.getElementById('in-h-i').value = "";
            document.getElementById('in-h-f').value = "";
            
            calc();
            nav('history');
        }

        function editItem(id) {
            vib();
            const item = db.find(i => i.id === id);
            if(!item) return;

            editingId = id;
            document.getElementById('in-ganho').value = item.ganho || "";
            document.getElementById('in-gasto').value = item.gasto || "";
            document.getElementById('in-km-i').value = item.k1 || "";
            document.getElementById('in-km-f').value = item.k2 || "";
            document.getElementById('in-h-i').value = item.h1 || "";
            document.getElementById('in-h-f').value = item.h2 || "";
            document.getElementById('in-cat').value = item.cat || "Combustível";
            
            let appRadio = document.querySelector(`input[name="appTag"][value="${item.app}"]`);
            if(appRadio) appRadio.checked = true;

            document.getElementById('btn-save').innerText = "ATUALIZAR LANÇAMENTO";
            nav('home');
            calc();
        }

        function deleteItem(id) {
            vib();
            if(confirm("Deseja apagar este lançamento?")) {
                db = db.filter(item => item.id !== id);
                localStorage.setItem('rotalucro_v19', JSON.stringify(db));
                renderHistory();
                showToast("Lançamento apagado!");
            }
        }

        function renderHistory() {
            const cont = document.getElementById('history-content');
            cont.innerHTML = db.length ? "" : "<div style='text-align:center; color:#71717a; padding: 40px;'><i class='fas fa-box-open' style='font-size: 2rem; margin-bottom:10px;'></i><br>Nenhum lançamento ainda.</div>";
            
            db.forEach(i => {
                cont.innerHTML += `
                <div class="hist-card">
                    <div style="flex:1;">
                        <b style="font-size:1.1rem">${i.date.substring(0,5)}</b>
                        <div style="margin: 6px 0;">
                            <span class="tag" style="color:var(--primary)">${i.app || 'App'}</span>
                            <span class="tag" style="background:#27272a; color:#a1a1aa">${i.cat || 'Gasto'}</span>
                        </div>
                        <small style="color:var(--text-dim)">${i.km}km • ${i.horas.toFixed(1)}h</small>
                    </div>
                    <div style="text-align:right">
                        <b style="color:var(--success); font-size:1.2rem">${formatMoney(i.lucro)}</b><br>
                        <small style="color:var(--text-dim)">Gasto: ${formatMoney(i.gasto)}</small>
                    </div>
                    <div class="actions-btn">
                        <button class="btn-icon edit" onclick="editItem(${i.id})"><i class="fas fa-pen"></i></button>
                        <button class="btn-icon del" onclick="deleteItem(${i.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
        }

        // NOVIDADE: Atualiza o Dropdown (Select) extraindo os meses únicos do banco de dados
        function updateMonthDropdown() {
            const filter = document.getElementById('month-filter');
            const currentVal = filter.value;
            
            const months = [...new Set(db.map(item => item.date.substring(3, 10)))]; // Pega apenas MM/YYYY
            
            let html = `<option value="all">Todo Período</option>`;
            months.forEach(m => {
                html += `<option value="${m}">${m}</option>`;
            });
            
            filter.innerHTML = html;
            
            if (months.includes(currentVal)) {
                filter.value = currentVal;
            } else if (currentVal === 'all') {
                filter.value = 'all';
            } else if (months.length > 0) {
                const currentMonth = new Date().toLocaleDateString('pt-BR', {month:'2-digit', year:'numeric'});
                filter.value = months.includes(currentMonth) ? currentMonth : months[0];
            }
        }

        function renderChart() {
            const filterVal = document.getElementById('month-filter').value;
            
            // NOVIDADE: Filtra o array de banco de dados pelo mês selecionado
            let filteredDb = db;
            if (filterVal !== 'all') {
                filteredDb = db.filter(item => item.date.substring(3, 10) === filterVal);
            }

            // GRÁFICO DE LINHA (LUCRO)
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            const groupedData = {};
            
            [...filteredDb].reverse().forEach(e => {
                const dia = e.date.substring(0,5);
                groupedData[dia] = (groupedData[dia] || 0) + e.lucro;
            });
            
            const diasDisponiveis = Object.keys(groupedData);
            // Se for "Todo Período", mostra só os últimos 7 para não esmagar o gráfico. Se tiver mês selecionado, mostra o mês todo!
            const diasExibidos = filterVal === 'all' ? diasDisponiveis.slice(-7) : diasDisponiveis;
            const dadosLucro = diasExibidos.map(dia => groupedData[dia]);

            if(lineChart) lineChart.destroy();
            lineChart = new Chart(ctxLine, {
                type: 'line',
                data: { labels: diasExibidos, datasets: [{ data: dadosLucro, borderColor: '#00e676', backgroundColor: 'rgba(0, 230, 118, 0.1)', borderWidth: 3, fill: true, tension: 0.4, pointRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#18181b' }, ticks: { color: '#71717a' } }, x: { grid: { display: false }, ticks: { color: '#71717a' } } } }
            });

            // GRÁFICO DE PIZZA/ROSCA (DESPESAS FILTRADAS)
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            const expData = { 'Combustível': 0, 'Alimentação': 0, 'Manutenção': 0, 'Outros': 0 };
            filteredDb.forEach(e => { if(e.gasto > 0) expData[e.cat || 'Outros'] += e.gasto; });
            
            if(pieChart) pieChart.destroy();
            pieChart = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(expData),
                    datasets: [{
                        data: Object.values(expData),
                        backgroundColor: ['#f59e0b', '#3b82f6', '#ef4444', '#71717a'],
                        borderWidth: 0, hoverOffset: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff', font:{size: 10} } } }, cutout: '70%' }
            });

            // ESTATÍSTICAS FILTRADAS
            const totalL = filteredDb.reduce((a, c) => a + c.lucro, 0);
            const totalG = filteredDb.reduce((a, c) => a + c.ganho, 0);
            const totalC = filteredDb.reduce((a, c) => a + c.gasto, 0);
            
            let resumoTitulo = filterVal === 'all' ? 'Acumulado Geral' : `Acumulado - ${filterVal}`;

            document.getElementById('stats-mensal').innerHTML = `
                <div style="background:var(--card-grad); padding:20px; border-radius:20px; border:1px solid var(--border)">
                    <span style="color:var(--text-dim); font-size:0.75rem; text-transform:uppercase; font-weight:700;">${resumoTitulo}</span>
                    <div style="font-size:2rem; font-weight:800; color:var(--success); margin:8px 0">${formatMoney(totalL)}</div>
                    <div style="display:flex; justify-content:space-between; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
                        <div style="color:var(--text-dim); font-size:0.8rem;">Bruto: <b style="color:#fff">${formatMoney(totalG)}</b><br>Gastos: <b style="color:var(--danger)">${formatMoney(totalC)}</b></div>
                    </div>
                </div>`;
        }

        function exportCSV() {
            vib();
            if(db.length === 0) return showToast("Sem dados");
            let csv = "Data,App,Ganho,Gasto,Categoria,KM,Horas,Lucro\n";
            db.forEach(i => { csv += `${i.date},${i.app},${i.ganho},${i.gasto},${i.cat},${i.km},${i.horas.toFixed(2)},${i.lucro}\n`; });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = "Relatorio_RotaLucro.csv"; link.click();
        }

        function exportBackup() {
            vib();
            if(db.length === 0) return showToast("Sem dados para backup");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const link = document.createElement("a");
            link.href = dataStr; link.download = "Backup_RotaLucro.json"; link.click();
            showToast("Backup baixado!");
        }

        function importBackup(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        db = imported;
                        localStorage.setItem('rotalucro_v19', JSON.stringify(db));
                        showToast("Backup Restaurado!");
                        nav('history');
                    } else throw new Error();
                } catch (err) { showToast("Arquivo inválido!"); }
            };
            reader.readAsText(file);
        }

        function resetAll() { 
            vib();
            if(confirm("ATENÇÃO: Deseja apagar TODO o seu histórico permanentemente?")) { 
                localStorage.clear(); db = []; location.reload(); 
            } 
        }
        
        calc();
    </script>
</body>
</html>
