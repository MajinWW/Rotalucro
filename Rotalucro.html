<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RotaLucro | Ultra Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --card-grad: linear-gradient(145deg, #18181b 0%, #050505 100%);
            --primary: #00e676;
            --primary-glow: rgba(0, 230, 118, 0.15);
            --success: #00ff88;
            --danger: #ff3b3b;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --border: #18181b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            background-color: var(--bg); color: var(--text-main); 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            padding-bottom: 110px;
        }

        /* TOAST NOTIFICATION ELEGANTE */
        #toast {
            position: fixed; top: -100px; left: 50%; 
            transform: translateX(-50%);
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary);
            padding: 16px 24px;
            border-radius: 20px;
            display: flex; align-items: center; gap: 12px;
            z-index: 9999; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 85%; max-width: 350px;
        }
        #toast.show { top: 30px; }
        #toast i { color: var(--primary); font-size: 1.2rem; }
        #toast span { font-weight: 700; font-size: 0.9rem; }

        header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 35px; height: 35px; border-radius: 10px; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.2rem; }
        .logo-text { font-size: 1.2rem; font-weight: 800; letter-spacing: -1px; }
        .logo-text span { color: var(--primary); }

        .summary-card {
            margin: 15px 20px 25px; padding: 25px;
            background: var(--card-grad); border-radius: 30px;
            border: 1px solid var(--border); position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden;
        }
        .card-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); font-weight: 700; }
        .card-value { font-size: 2.8rem; font-weight: 800; margin: 8px 0; letter-spacing: -1.5px; }
        .card-footer { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer-item span { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 2px; }
        .footer-item b { font-size: 0.85rem; }

        .section-title { padding: 0 25px; margin-bottom: 12px; font-size: 0.7rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .form-block { background: var(--surface); margin: 0 20px 15px; border-radius: 20px; border: 1px solid var(--border); }
        .input-row { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .input-row:last-child { border-bottom: none; }
        .input-row i { width: 30px; font-size: 1rem; color: var(--primary); opacity: 0.8; }
        .input-data { flex: 1; }
        .input-data label { font-size: 0.6rem; color: var(--text-dim); font-weight: 600; display: block; }
        .input-data input { background: none; border: none; color: white; font-size: 1rem; font-weight: 700; width: 100%; outline: none; padding-top: 2px; }

        .btn-save {
            margin: 15px 20px; width: calc(100% - 40px); background: var(--primary);
            color: #000; padding: 22px; border-radius: 22px; border: none;
            font-size: 1rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 30px var(--primary-glow); transition: 0.2s;
        }
        .btn-save:active { transform: scale(0.96); }

        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px;
            z-index: 100;
        }
        .tab-item { border: none; background: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1; }
        .tab-item.active { color: var(--primary); }
        .tab-item i { font-size: 1.2rem; }
        .tab-item span { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; }

        .hist-card { 
            background: var(--surface); margin: 0 20px 10px; padding: 20px; 
            border-radius: 24px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .hist-info b { font-size: 0.9rem; display: block; margin-bottom: 2px; }
        .hist-info span { font-size: 0.65rem; color: var(--text-dim); }
        .hist-val { text-align: right; }
        .hist-val b { font-size: 1rem; color: var(--success); display: block; }

        .hidden { display: none !important; }
        .animate { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-msg">Dados salvos com sucesso!</span>
    </div>

    <header>
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-route"></i></div>
            <div class="logo-text">ROTA<span>LUCRO</span></div>
        </div>
        <div onclick="reset()" style="color: var(--danger); font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">LIMPAR TUDO</div>
    </header>

    <div id="view-home" class="animate">
        <div class="summary-card">
            <span class="card-label">Saldo Hoje</span>
            <div class="card-value" id="val-lucro">R$ 0,00</div>
            
            <div class="card-footer">
                <div class="footer-item"><span>Bruto</span><b id="val-ganho">R$ 0</b></div>
                <div class="footer-item"><span>Rodado</span><b id="val-km">0 km</b></div>
                <div class="footer-item" style="text-align: right;"><span>R$ / Hora</span><b id="val-hora" style="color: var(--primary)">R$ 0</b></div>
            </div>
        </div>

        <div class="section-title">Financeiro</div>
        <div class="form-block">
            <div class="input-row">
                <i class="fas fa-wallet"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>Ganhos</label><input type="number" id="in-ganho" oninput="calc()" placeholder="0.00" inputmode="decimal"></div>
                    <div class="input-data"><label>Gastos</label><input type="number" id="in-gasto" oninput="calc()" placeholder="0.00" inputmode="decimal"></div>
                </div>
            </div>
        </div>

        <div class="section-title">Logística</div>
        <div class="form-block">
            <div class="input-row">
                <i class="fas fa-road"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>KM Inicial</label><input type="number" id="in-km-i" oninput="calc()" inputmode="numeric"></div>
                    <div class="input-data"><label>KM Final</label><input type="number" id="in-km-f" oninput="calc()" inputmode="numeric"></div>
                </div>
            </div>
            <div class="input-row">
                <i class="fas fa-clock"></i>
                <div style="display:flex; gap:15px; flex:1">
                    <div class="input-data"><label>Início</label><input type="time" id="in-h-i" onchange="calc()"></div>
                    <div class="input-data"><label>Fim</label><input type="time" id="in-h-f" onchange="calc()"></div>
                </div>
            </div>
        </div>

        <button class="btn-save" onclick="save()">SALVAR DIA TRABALHADO</button>
    </div>

    <div id="view-history" class="hidden animate">
        <div class="section-title" style="margin-top: 15px;">Seu Histórico</div>
        <div id="history-content"></div>
    </div>

    <nav class="tab-bar">
        <button class="tab-item active" id="tab-home" onclick="nav('home')">
            <i class="fas fa-plus-circle"></i>
            <span>Lançar</span>
        </button>
        <button class="tab-item" id="tab-history" onclick="nav('history')">
            <i class="fas fa-history"></i>
            <span>Histórico</span>
        </button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('rotalucro_v14')) || [];

        function showToast(msg, error = false) {
            const toast = document.getElementById('toast');
            const icon = toast.querySelector('i');
            document.getElementById('toast-msg').innerText = msg;
            
            toast.style.borderColor = error ? 'var(--danger)' : 'var(--primary)';
            icon.className = error ? 'fas fa-exclamation-triangle' : 'fas fa-check-circle';
            icon.style.color = error ? 'var(--danger)' : 'var(--primary)';

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function nav(page) {
            document.querySelectorAll('.animate').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            
            if(page === 'home') {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('tab-home').classList.add('active');
            } else {
                document.getElementById('view-history').classList.remove('hidden');
                document.getElementById('tab-history').classList.add('active');
                render();
            }
        }

        function calc() {
            const ganho = parseFloat(document.getElementById('in-ganho').value) || 0;
            const gasto = parseFloat(document.getElementById('in-gasto').value) || 0;
            const k1 = parseInt(document.getElementById('in-km-i').value) || 0;
            const k2 = parseInt(document.getElementById('in-km-f').value) || 0;
            const h1 = document.getElementById('in-h-i').value;
            const h2 = document.getElementById('in-h-f').value;

            const lucro = ganho - gasto;
            const km = (k2 > k1) ? k2 - k1 : 0;

            let mHora = 0;
            if(h1 && h2) {
                const [hr1, min1] = h1.split(':').map(Number);
                const [hr2, min2] = h2.split(':').map(Number);
                let diff = (hr2 * 60 + min2) - (hr1 * 60 + min1);
                if(diff < 0) diff += 1440;
                if(diff > 0) mHora = lucro / (diff / 60);
            }

            document.getElementById('val-lucro').innerText = `R$ ${lucro.toFixed(2)}`;
            document.getElementById('val-ganho').innerText = `R$ ${ganho.toFixed(0)}`;
            document.getElementById('val-km').innerText = `${km} km`;
            document.getElementById('val-hora').innerText = `R$ ${mHora.toFixed(2)}`;

            return { ganho, gasto, km, lucro, mHora, date: new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'short'}) };
        }

        function save() {
            const d = calc();
            if(d.ganho <= 0) {
                showToast("Insira o valor ganho hoje!", true);
                return;
            }
            
            db.unshift({ ...d, id: Date.now() });
            localStorage.setItem('rotalucro_v14', JSON.stringify(db));
            
            showToast("Fechamento salvo com sucesso!");
            
            setTimeout(() => {
                document.querySelectorAll('input').forEach(i => i.value = "");
                calc();
                nav('history');
            }, 800);
        }

        function render() {
            const container = document.getElementById('history-content');
            container.innerHTML = "";
            if(db.length === 0) container.innerHTML = "<div style='text-align:center; padding:50px; color:#333'>Ainda não há dados.</div>";

            db.forEach(i => {
                container.innerHTML += `
                <div class="hist-card">
                    <div class="hist-info">
                        <b>${i.date.toUpperCase()}</b>
                        <span>${i.km} km • R$ ${i.mHora.toFixed(2)}/h</span>
                    </div>
                    <div class="hist-val">
                        <b style="color:${i.lucro >= 0 ? 'var(--success)' : 'var(--danger)'}">R$ ${i.lucro.toFixed(2)}</b>
                        <span style="font-size:0.6rem; color:var(--text-dim)">BRUTO R$ ${i.ganho.toFixed(0)}</span>
                    </div>
                </div>`;
            });
        }

        function reset() {
            if(confirm("Tem certeza que deseja apagar todos os dados?")) {
                localStorage.removeItem('rotalucro_v14');
                db = [];
                location.reload();
            }
        }

        calc();
    </script>
</body>
</html>
